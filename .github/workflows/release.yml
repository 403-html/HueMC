name: Release

on:
  push:
    tags:
      - 'mc-*-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"        # e.g. mc-b181-v1.0.1
          MODULE="${TAG%-v*}"             # mc-b181
          VERSION="${TAG##*-v}"           # 1.0.1
          echo "module=$MODULE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: ./gradlew :versions:${{ steps.tag.outputs.module }}:build -PreleaseVersion=${{ steps.tag.outputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.tag.outputs.module }} v${{ steps.tag.outputs.version }}"
          files: versions/${{ steps.tag.outputs.module }}/build/libs/*.jar
          generate_release_notes: true
